# Capacity for two split peripherals plus five Bluetooth host profiles.
# The direct (no-dongle) build uses one peripheral and has one spare slot.
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Persist Bluetooth and split bonds in the XIAO's storage partition.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_SETTINGS_NVS=y

CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_BATTERY_REPORT_INTERVAL=1800

CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
